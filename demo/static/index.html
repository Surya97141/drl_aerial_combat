<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Aerial Combat AI — Live Demo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; font-family: 'Courier New', monospace; }

  #renderCanvas { width: 100vw; height: 100vh; display: block; }

  /* HUD canvas sits on top of the 3D canvas */
  #hudCanvas {
    position: fixed; top: 0; left: 0;
    width: 100vw; height: 100vh;
    pointer-events: none; z-index: 10;
  }

  /* Mode selector */
  #modePanel {
    position: fixed; top: 20px; left: 50%;
    transform: translateX(-50%);
    display: flex; gap: 8px; z-index: 20;
  }
  .modeBtn {
    padding: 10px 22px;
    background: rgba(0,30,0,0.85);
    border: 1px solid #0f0; color: #0f0;
    font-family: 'Courier New', monospace;
    font-size: 13px; font-weight: bold;
    cursor: pointer; letter-spacing: 1px;
    text-transform: uppercase;
    transition: all 0.2s;
  }
  .modeBtn:hover  { background: rgba(0,80,0,0.9); }
  .modeBtn.active { background: #0a3d0a; border-color: #0f0; box-shadow: 0 0 12px #0f04; }

  /* EDT diagnosis panel */
  #edtPanel {
    position: fixed; bottom: 20px; left: 20px;
    width: 340px; background: rgba(0,10,0,0.9);
    border: 1px solid #0f0; color: #0f0;
    padding: 14px; z-index: 20;
    font-size: 12px; line-height: 1.7;
    display: none;
    animation: slideIn 0.4s ease;
  }
  @keyframes slideIn {
    from { transform: translateX(-360px); opacity: 0; }
    to   { transform: translateX(0);      opacity: 1; }
  }
  #edtPanel h3 { color: #0ff; font-size: 11px; letter-spacing: 2px; margin-bottom: 8px; }
  .edt-row { display: flex; justify-content: space-between; border-bottom: 1px solid #030; padding: 3px 0; }
  .edt-label { color: #888; }
  .edt-value { color: #0f0; font-weight: bold; }
  .edt-code  { margin-top: 10px; background: #001500; padding: 8px; color: #0ff; font-size: 11px; border-left: 2px solid #0f0; }

  /* Controls hint */
  #controls {
    position: fixed; bottom: 20px; right: 20px;
    background: rgba(0,10,0,0.85);
    border: 1px solid #0f04; color: #0f08;
    padding: 12px 16px; font-size: 11px;
    line-height: 1.9; z-index: 20;
    letter-spacing: 0.5px;
  }
  #controls b { color: #0f0; }

  /* Kill/death flash */
  #flash {
    position: fixed; top: 0; left: 0;
    width: 100vw; height: 100vh;
    pointer-events: none; z-index: 30;
    opacity: 0; transition: opacity 0.3s;
  }
</style>
</head>
<body>

<canvas id="renderCanvas"></canvas>
<canvas id="hudCanvas"></canvas>

<div id="modePanel">
  <button class="modeBtn active" onclick="setMode('manual')" id="btn-manual">✈ FLY MANUAL</button>
  <button class="modeBtn"        onclick="setMode('ai')"     id="btn-ai">⚡ AI PILOT</button>
  <button class="modeBtn"        onclick="setMode('degraded')" id="btn-degraded">⚠ DEGRADED AI</button>
</div>

<div id="edtPanel">
  <h3>◈ EDT EPISODE DIAGNOSIS</h3>
  <div class="edt-row"><span class="edt-label">FAILURE MODE</span><span class="edt-value" id="edt-failure">—</span></div>
  <div class="edt-row"><span class="edt-label">RECOMMENDED FIX</span><span class="edt-value" id="edt-fix">—</span></div>
  <div class="edt-row"><span class="edt-label">CONFIDENCE</span><span class="edt-value" id="edt-conf">—</span></div>
  <div class="edt-row"><span class="edt-label">CRITICAL STEPS</span><span class="edt-value" id="edt-steps">—</span></div>
  <div class="edt-code" id="edt-advice">—</div>
</div>

<div id="controls" id="controls-hint">
  <b>CONTROLS</b><br>
  W / S &nbsp;&nbsp;&nbsp; Throttle ±<br>
  ↑ / ↓ &nbsp;&nbsp;&nbsp; Pitch<br>
  A / D &nbsp;&nbsp;&nbsp; Yaw<br>
  Q / E &nbsp;&nbsp;&nbsp; Roll<br>
  R &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Reset
</div>

<div id="flash"></div>

<!-- Babylon.js CDN -->
<script src="https://cdn.babylonjs.com/babylon.js"></script>
<script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
<script src="https://cdn.babylonjs.com/materialsLibrary/babylonjs.materials.min.js"></script>

<script>
// ============================================================
// SCENE SETUP
// ============================================================

const canvas  = document.getElementById('renderCanvas');
const engine  = new BABYLON.Engine(canvas, true, { preserveDrawingBuffer: true });
const scene   = new BABYLON.Scene(engine);
scene.clearColor = new BABYLON.Color4(0.02, 0.04, 0.08, 1);

// Camera — follow agent from behind
const camera = new BABYLON.FollowCamera("cam", new BABYLON.Vector3(0, 5, -20), scene);
camera.radius        = 22;
camera.heightOffset  = 6;
camera.rotationOffset = 180;
camera.cameraAcceleration = 0.06;
camera.maxCameraSpeed     = 30;

// Lighting
const sun = new BABYLON.DirectionalLight("sun", new BABYLON.Vector3(-1, -2, -1), scene);
sun.intensity = 1.4;
sun.diffuse   = new BABYLON.Color3(1, 0.95, 0.85);

const ambient = new BABYLON.HemisphericLight("amb", new BABYLON.Vector3(0, 1, 0), scene);
ambient.intensity = 0.4;
ambient.diffuse   = new BABYLON.Color3(0.4, 0.6, 1.0);

// ============================================================
// SKY
// ============================================================

const skyMat  = new BABYLON.SkyMaterial("sky", scene);
skyMat.backFaceCulling = false;
skyMat.inclination     = 0.0;
skyMat.azimuth         = 0.25;
skyMat.luminance       = 0.9;
skyMat.turbidity       = 8;
skyMat.rayleigh        = 2;
skyMat.mieCoefficient  = 0.005;
skyMat.mieDirectionalG = 0.98;
const skybox = BABYLON.MeshBuilder.CreateBox("sky", { size: 5000 }, scene);
skybox.material = skyMat;

// ============================================================
// TERRAIN
// ============================================================

const ground = BABYLON.MeshBuilder.CreateGroundFromHeightMap(
  "terrain", "/static/assets/heightmap.png",
  { width: 8000, height: 8000, subdivisions: 80, minHeight: 0, maxHeight: 200 },
  scene
);
const groundMat = new BABYLON.StandardMaterial("gnd", scene);
groundMat.diffuseColor  = new BABYLON.Color3(0.18, 0.28, 0.12);
groundMat.specularColor = new BABYLON.Color3(0.05, 0.05, 0.05);
ground.material = groundMat;

// ============================================================
// AIRCRAFT MESHES
// ============================================================

function buildAircraftMesh(name, color) {
  const root = new BABYLON.TransformNode(name, scene);

  // Fuselage
  const body = BABYLON.MeshBuilder.CreateCylinder(name + "_body",
    { height: 4, diameterTop: 0.3, diameterBottom: 0.6, tessellation: 8 }, scene);
  body.rotation.z = Math.PI / 2;
  body.parent = root;

  // Wings
  const wingL = BABYLON.MeshBuilder.CreateBox(name + "_wL",
    { width: 4.5, height: 0.15, depth: 1.4 }, scene);
  wingL.position = new BABYLON.Vector3(0, 0, 0.2);
  wingL.parent = root;

  // Tail fins
  const tail = BABYLON.MeshBuilder.CreateBox(name + "_tail",
    { width: 2, height: 0.12, depth: 0.8 }, scene);
  tail.position = new BABYLON.Vector3(0, 0.3, -1.6);
  tail.parent = root;

  // Material
  const mat = new BABYLON.StandardMaterial(name + "_mat", scene);
  mat.diffuseColor   = color;
  mat.specularColor  = new BABYLON.Color3(0.6, 0.6, 0.6);
  mat.specularPower  = 64;
  mat.emissiveColor  = color.scale(0.05);
  [body, wingL, tail].forEach(m => m.material = mat);

  return root;
}

const agentMesh = buildAircraftMesh("agent",
  new BABYLON.Color3(0.2, 0.5, 1.0));    // blue
const oppMesh   = buildAircraftMesh("opp",
  new BABYLON.Color3(1.0, 0.2, 0.1));    // red

camera.lockedTarget = agentMesh;

// ============================================================
// PARTICLE SYSTEMS — ENGINE GLOW + MISSILE FIRE + EXPLOSION
// ============================================================

// Agent engine glow
function makeEngineGlow(parent, color) {
  const ps = new BABYLON.ParticleSystem("glow", 200, scene);
  ps.particleTexture = new BABYLON.Texture(
    "https://playground.babylonjs.com/textures/flare.png", scene);
  ps.emitter  = parent;
  ps.minEmitBox = new BABYLON.Vector3(-0.1, 0, -2.2);
  ps.maxEmitBox = new BABYLON.Vector3( 0.1, 0, -2.0);
  ps.color1 = color;
  ps.color2 = new BABYLON.Color4(1, 1, 1, 0.8);
  ps.colorDead = new BABYLON.Color4(0, 0, 0, 0);
  ps.minSize = 0.2; ps.maxSize = 0.6;
  ps.minLifeTime = 0.05; ps.maxLifeTime = 0.15;
  ps.emitRate = 120;
  ps.blendMode = BABYLON.ParticleSystem.BLENDMODE_ADD;
  ps.direction1 = new BABYLON.Vector3(-0.1, -0.1, -1);
  ps.direction2 = new BABYLON.Vector3( 0.1,  0.1, -1);
  ps.minEmitPower = 3; ps.maxEmitPower = 6;
  ps.updateSpeed = 0.02;
  ps.start();
  return ps;
}

const agentGlow = makeEngineGlow(agentMesh, new BABYLON.Color4(0.3, 0.6, 1.0, 1.0));
const oppGlow   = makeEngineGlow(oppMesh,   new BABYLON.Color4(1.0, 0.3, 0.1, 1.0));

// Missile fire flash
function makeMuzzleFlash(parent) {
  const ps = new BABYLON.ParticleSystem("muzzle", 80, scene);
  ps.particleTexture = new BABYLON.Texture(
    "https://playground.babylonjs.com/textures/flare.png", scene);
  ps.emitter    = parent;
  ps.minEmitBox = new BABYLON.Vector3(-0.3, -0.1, 2);
  ps.maxEmitBox = new BABYLON.Vector3( 0.3,  0.1, 2.5);
  ps.color1 = new BABYLON.Color4(1, 0.8, 0.2, 1);
  ps.color2 = new BABYLON.Color4(1, 0.4, 0.0, 0.8);
  ps.colorDead = new BABYLON.Color4(0.2, 0.1, 0, 0);
  ps.minSize = 0.1; ps.maxSize = 0.4;
  ps.minLifeTime = 0.04; ps.maxLifeTime = 0.1;
  ps.emitRate = 0;   // triggered manually
  ps.blendMode = BABYLON.ParticleSystem.BLENDMODE_ADD;
  ps.minEmitPower = 5; ps.maxEmitPower = 12;
  ps.direction1 = new BABYLON.Vector3(-0.2, -0.2, 1);
  ps.direction2 = new BABYLON.Vector3( 0.2,  0.2, 1);
  ps.start();
  return ps;
}

const agentMuzzle = makeMuzzleFlash(agentMesh);
const oppMuzzle   = makeMuzzleFlash(oppMesh);

// Explosion
function triggerExplosion(position) {
  const ps = new BABYLON.ParticleSystem("expl", 600, scene);
  ps.particleTexture = new BABYLON.Texture(
    "https://playground.babylonjs.com/textures/flare.png", scene);
  ps.emitter    = position.clone();
  ps.minEmitBox = new BABYLON.Vector3(-1, -1, -1);
  ps.maxEmitBox = new BABYLON.Vector3( 1,  1,  1);
  ps.color1    = new BABYLON.Color4(1.0, 0.6, 0.1, 1);
  ps.color2    = new BABYLON.Color4(0.8, 0.2, 0.0, 0.8);
  ps.colorDead = new BABYLON.Color4(0.1, 0.1, 0.1, 0);
  ps.minSize = 0.5; ps.maxSize = 3.5;
  ps.minLifeTime = 0.4; ps.maxLifeTime = 1.2;
  ps.emitRate   = 800;
  ps.blendMode  = BABYLON.ParticleSystem.BLENDMODE_ADD;
  ps.minEmitPower = 8; ps.maxEmitPower = 20;
  ps.direction1 = new BABYLON.Vector3(-1, -1, -1);
  ps.direction2 = new BABYLON.Vector3( 1,  1,  1);
  ps.gravity    = new BABYLON.Vector3(0, -4, 0);
  ps.updateSpeed = 0.02;
  ps.start();
  setTimeout(() => ps.stop(), 300);
  setTimeout(() => ps.dispose(), 2000);

  // Screen flash
  const flash = document.getElementById('flash');
  flash.style.background = 'radial-gradient(circle, rgba(255,180,50,0.6) 0%, transparent 70%)';
  flash.style.opacity = '1';
  setTimeout(() => flash.style.opacity = '0', 400);
}

// ============================================================
// POST-PROCESSING PIPELINE
// ============================================================

const pipeline = new BABYLON.DefaultRenderingPipeline("pip", true, scene, [camera]);
pipeline.bloomEnabled    = true;
pipeline.bloomThreshold  = 0.6;
pipeline.bloomWeight     = 0.4;
pipeline.bloomKernel     = 64;
pipeline.bloomScale      = 0.5;
pipeline.fxaaEnabled     = true;
pipeline.imageProcessingEnabled = true;
pipeline.imageProcessing.contrast   = 1.2;
pipeline.imageProcessing.exposure   = 1.1;
pipeline.imageProcessing.toneMappingEnabled = true;
pipeline.imageProcessing.toneMappingType =
  BABYLON.ImageProcessingConfiguration.TONEMAPPING_ACES;

// Chromatic aberration for degraded mode (graceful fallback if unavailable)
let lensEffect = null;
try {
  lensEffect = new BABYLON.LensRenderingPipeline(
    "lens", { edge_blur: 0, chromatic_aberration: 0, distortion: 0 },
    scene, 1.0, [camera]);
} catch(e) { /* LensRenderingPipeline unavailable — skip */ }

// ============================================================
// WEBSOCKET
// ============================================================

let ws, latestState = null, connected = false;
let mode = 'manual';

function connect() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}/ws`);

  ws.onopen = () => {
    connected = true;
    ws.send(JSON.stringify({ type: 'set_mode', mode }));
  };

  ws.onmessage = e => {
    latestState = JSON.parse(e.data);
    if (latestState.type === 'mode_changed') return;
    updateScene(latestState);
  };

  ws.onclose = () => {
    connected = false;
    setTimeout(connect, 2000);
  };
}

connect();

// ============================================================
// KEYBOARD INPUT
// ============================================================

const keys = {};
document.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (e.key === 'r' || e.key === 'R') sendReset();
});
document.addEventListener('keyup', e => keys[e.key] = false);

let inputInterval = setInterval(() => {
  if (!connected || mode !== 'manual') return;
  ws.send(JSON.stringify({
    type:     'input',
    throttle: (keys['w'] || keys['W']) ? 1.0 : (keys['s'] || keys['S']) ? -1.0 : 0.0,
    pitch:    keys['ArrowUp']    ? 1.0 : keys['ArrowDown']  ? -1.0 : 0.0,
    yaw:      (keys['a'] || keys['A']) ? -1.0 : (keys['d'] || keys['D']) ? 1.0 : 0.0,
    roll:     (keys['q'] || keys['Q']) ? -1.0 : (keys['e'] || keys['E']) ? 1.0 : 0.0,
  }));
}, 33);  // ~30fps input

function sendReset() {
  if (connected) ws.send(JSON.stringify({ type: 'reset' }));
}

// ============================================================
// SCENE UPDATE — called every time a state arrives
// ============================================================

let prevAgentHealth = 100, prevOppHealth = 100;
let trailPoints = [], trailMax = 120;
let trailLines  = null;

function vec3(arr) {
  return new BABYLON.Vector3(arr[0] / 10, arr[2] / 10, arr[1] / 10);
}

function updateScene(s) {
  if (!s.agent) return;

  // Move aircraft
  const ap = vec3(s.agent.pos);
  const op = vec3(s.opponent.pos);

  agentMesh.position.copyFrom(ap);
  oppMesh.position.copyFrom(op);

  // Heading → rotation
  agentMesh.rotation.y = -s.agent.heading;
  oppMesh.rotation.y   = -s.opponent.heading;

  // Pitch from vertical velocity
  const pv = s.agent.vel[2] / 50.0;
  agentMesh.rotation.z = Math.max(-0.6, Math.min(0.6, pv));

  // Muzzle flash when in range
  if (s.in_range) {
    agentMuzzle.emitRate = 80;
    setTimeout(() => agentMuzzle.emitRate = 0, 80);
  }
  if (s.opp_in_range) {
    oppMuzzle.emitRate = 60;
    setTimeout(() => oppMuzzle.emitRate = 0, 80);
  }

  // Degraded mode — chromatic aberration
  if (lensEffect) {
    lensEffect.setEdgeBlur(s.mode === 'degraded' ? 1.2 : 0);
    lensEffect.setChromaticAberration(s.mode === 'degraded' ? 2.0 : 0);
  }

  // Explosion on kill/death
  if (prevOppHealth > 0 && s.opponent.health <= 0) triggerExplosion(op);
  if (prevAgentHealth > 0 && s.agent.health <= 0)  triggerExplosion(ap);
  prevAgentHealth = s.agent.health;
  prevOppHealth   = s.opponent.health;

  // Agent trail
  trailPoints.push(ap.clone());
  if (trailPoints.length > trailMax) trailPoints.shift();
  if (trailLines) trailLines.dispose();
  if (trailPoints.length > 2) {
    trailLines = BABYLON.MeshBuilder.CreateLines("trail",
      { points: trailPoints, updatable: false }, scene);
    trailLines.color = new BABYLON.Color3(0.2, 0.5, 1.0);
    trailLines.alpha = 0.35;
  }

  // EDT panel
  if (s.done && s.edt) showEDT(s.edt);
  if (!s.done) hideEDT();
}

function showEDT(edt) {
  const panel = document.getElementById('edtPanel');
  panel.style.display = 'block';
  document.getElementById('edt-failure').textContent = edt.failure_mode  || '—';
  document.getElementById('edt-fix').textContent     = edt.fix_type      || '—';
  document.getElementById('edt-conf').textContent    = edt.fix_conf
    ? (edt.fix_conf * 100).toFixed(0) + '%' : '—';
  document.getElementById('edt-steps').textContent   =
    (edt.critical_steps || []).join(', ') || '—';
  document.getElementById('edt-advice').textContent  = edt.error
    ? 'EDT not available'
    : getAdvice(edt.fix_type);
}

function hideEDT() {
  document.getElementById('edtPanel').style.display = 'none';
}

const ADVICE = {
  NO_FIX_NEEDED:          'Agent performing optimally.',
  ADD_ALTITUDE_PENALTY:   'if altitude < 200:\n  reward -= (200-alt)/200 * 5.0',
  REDUCE_PROXIMITY_RANGE: 'Gate proximity reward to <=1000 m.',
  ADD_FIRING_BONUS:       'if agent_fired:\n  reward += 1.5',
  INCREASE_KILL_REWARD:   'if kill:\n  reward += 150.0  # was 100',
  FIX_OPP_ADVANTAGE:      'Increase agent engagement_range to 700 m.',
};
function getAdvice(fix) { return ADVICE[fix] || fix; }

// ============================================================
// HUD — Canvas 2D Military Overlay
// ============================================================

const hud    = document.getElementById('hudCanvas');
const ctx    = hud.getContext('2d');

function resizeHUD() {
  hud.width  = window.innerWidth;
  hud.height = window.innerHeight;
}
resizeHUD();
window.addEventListener('resize', resizeHUD);

function drawHUD(s) {
  const W = hud.width, H = hud.height;
  ctx.clearRect(0, 0, W, H);
  if (!s || !s.agent) return;

  const GREEN  = '#00ff00';
  const AMBER  = '#ffaa00';
  const RED    = '#ff2222';
  const DIM    = 'rgba(0,255,0,0.35)';

  ctx.shadowBlur  = 6;
  ctx.shadowColor = GREEN;

  // ---- Health bars ----
  function drawHealth(label, value, x, y, color) {
    ctx.fillStyle = 'rgba(0,20,0,0.7)';
    ctx.fillRect(x, y, 160, 18);
    const barColor = value > 60 ? GREEN : value > 30 ? AMBER : RED;
    ctx.fillStyle = barColor;
    ctx.fillRect(x + 2, y + 2, (value / 100) * 156, 14);
    ctx.strokeStyle = color;
    ctx.lineWidth = 1;
    ctx.strokeRect(x, y, 160, 18);
    ctx.fillStyle = color;
    ctx.font = 'bold 11px Courier New';
    ctx.fillText(`${label}  ${value.toFixed(0)}%`, x + 4, y + 13);
  }

  drawHealth('AGENT HP', Math.max(0, s.agent.health),    W/2 - 170, H - 80, GREEN);
  drawHealth('BANDIT HP', Math.max(0, s.opponent.health), W/2 + 10,  H - 80, RED);

  // ---- Altitude tape (left) ----
  const alt   = (s.agent.pos[2]).toFixed(0);
  const speed = Math.sqrt(s.agent.vel[0]**2 + s.agent.vel[1]**2 + s.agent.vel[2]**2).toFixed(0);
  ctx.fillStyle = 'rgba(0,10,0,0.75)';
  ctx.fillRect(20, H/2 - 60, 80, 120);
  ctx.strokeStyle = DIM; ctx.lineWidth = 1;
  ctx.strokeRect(20, H/2 - 60, 80, 120);
  ctx.fillStyle = GREEN; ctx.font = 'bold 12px Courier New';
  ctx.fillText('ALT', 30, H/2 - 40);
  ctx.font = 'bold 18px Courier New';
  ctx.fillText(alt + 'm', 24, H/2);
  ctx.font = 'bold 12px Courier New';
  ctx.fillText('SPD', 30, H/2 + 30);
  ctx.font = 'bold 18px Courier New';
  ctx.fillText(speed, 24, H/2 + 50);

  // ---- Distance indicator (centre-top) ----
  const dist   = s.distance;
  const inRange = s.in_range;
  ctx.fillStyle = 'rgba(0,10,0,0.75)';
  ctx.fillRect(W/2 - 80, 60, 160, 36);
  ctx.strokeStyle = inRange ? '#ff4444' : DIM;
  ctx.lineWidth   = inRange ? 2 : 1;
  ctx.strokeRect(W/2 - 80, 60, 160, 36);
  ctx.fillStyle = inRange ? RED : GREEN;
  ctx.font      = 'bold 13px Courier New';
  ctx.textAlign = 'center';
  ctx.fillText(inRange ? '⚠ IN RANGE' : 'RANGE  ' + dist.toFixed(0) + 'm', W/2, 83);
  ctx.textAlign = 'left';

  // ---- Radar (bottom-right) ----
  const rx = W - 110, ry = H - 110, rr = 80;
  ctx.beginPath();
  ctx.arc(rx, ry, rr, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(0,20,0,0.75)';
  ctx.fill();
  ctx.strokeStyle = DIM; ctx.lineWidth = 1;
  ctx.stroke();

  // Radar range rings
  [0.33, 0.66, 1.0].forEach(f => {
    ctx.beginPath();
    ctx.arc(rx, ry, rr * f, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(0,100,0,0.3)'; ctx.lineWidth = 0.5;
    ctx.stroke();
  });

  // Sweep line
  const sweepAngle = (Date.now() / 1200) % (Math.PI * 2);
  ctx.beginPath();
  ctx.moveTo(rx, ry);
  ctx.lineTo(rx + Math.cos(sweepAngle) * rr, ry + Math.sin(sweepAngle) * rr);
  ctx.strokeStyle = 'rgba(0,255,0,0.5)'; ctx.lineWidth = 1.5;
  ctx.stroke();

  // Agent dot (centre)
  ctx.beginPath();
  ctx.arc(rx, ry, 4, 0, Math.PI * 2);
  ctx.fillStyle = GREEN; ctx.fill();

  // Bandit blip
  const relX = (s.opponent.pos[0] - s.agent.pos[0]) / 150;
  const relY = (s.opponent.pos[1] - s.agent.pos[1]) / 150;
  const bx   = rx + Math.max(-rr + 5, Math.min(rr - 5, relX * rr));
  const by   = ry + Math.max(-rr + 5, Math.min(rr - 5, relY * rr));
  ctx.beginPath();
  ctx.arc(bx, by, 5, 0, Math.PI * 2);
  ctx.fillStyle = RED; ctx.fill();

  // ---- Kill/Death counter ----
  ctx.fillStyle = 'rgba(0,10,0,0.75)';
  ctx.fillRect(W - 130, 20, 110, 36);
  ctx.strokeStyle = DIM; ctx.lineWidth = 1;
  ctx.strokeRect(W - 130, 20, 110, 36);
  ctx.fillStyle = GREEN; ctx.font = 'bold 12px Courier New';
  ctx.fillText(`K:${s.kills || 0}  D:${s.deaths || 0}`, W - 120, 43);

  // ---- Mode label ----
  const modeLabel = { manual: 'MANUAL CTRL', ai: 'AI PILOT', degraded: 'DEGRADED AI' };
  ctx.fillStyle = 'rgba(0,10,0,0.75)';
  ctx.fillRect(20, 20, 150, 28);
  ctx.strokeStyle = s.mode === 'degraded' ? AMBER : DIM;
  ctx.strokeRect(20, 20, 150, 28);
  ctx.fillStyle = s.mode === 'degraded' ? AMBER : GREEN;
  ctx.font = 'bold 12px Courier New';
  ctx.fillText('◈ ' + (modeLabel[s.mode] || s.mode.toUpperCase()), 28, 39);

  // ---- Outcome flash ----
  if (s.done && s.outcome) {
    ctx.fillStyle = s.outcome === 'kill' ? 'rgba(0,255,0,0.15)' : 'rgba(255,0,0,0.15)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = s.outcome === 'kill' ? GREEN : RED;
    ctx.font = 'bold 48px Courier New';
    ctx.textAlign = 'center';
    const msg = s.outcome === 'kill' ? '✈ KILL CONFIRMED' :
                s.outcome === 'crashed' ? '✈ AIRCRAFT LOST' : '✈ ' + s.outcome.toUpperCase();
    ctx.fillText(msg, W/2, H/2);
    ctx.textAlign = 'left';
  }

  // ---- Step counter ----
  ctx.fillStyle = DIM;
  ctx.font = '10px Courier New';
  ctx.fillText(`STEP: ${s.step || 0}  EP: ${s.episode || 0}`, 22, H - 20);
}

// ============================================================
// MODE BUTTONS
// ============================================================

function setMode(m) {
  mode = m;
  document.querySelectorAll('.modeBtn').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-' + m).classList.add('active');
  trailPoints = [];
  hideEDT();
  if (connected) ws.send(JSON.stringify({ type: 'set_mode', mode: m }));

  // Show/hide controls hint
  document.getElementById('controls').style.display =
    m === 'manual' ? 'block' : 'none';
}

// ============================================================
// MAIN RENDER LOOP
// ============================================================

engine.runRenderLoop(() => {
  scene.render();
  drawHUD(latestState);
});

window.addEventListener('resize', () => engine.resize());
</script>
